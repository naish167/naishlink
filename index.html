<!DOCTYPE html>
<html>
<head>
    <title>Naishlink | AI Professional</title>
    <style>
        /* Colorful & Fun Theme */
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; color: white;
        }
        .container { 
            background: rgba(255, 255, 255, 0.95); padding: 40px; 
            border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
            width: 450px; text-align: center; color: #333;
        }
        h1 { color: #764ba2; margin-bottom: 5px; font-size: 2.5rem; }
        p { color: #666; margin-bottom: 20px; font-style: italic; }
        textarea { 
            width: 100%; height: 120px; border: 2px solid #ddd; 
            border-radius: 15px; padding: 15px; font-size: 1rem; 
            resize: none; margin-bottom: 20px;
        }
        button { 
            background: #667eea; color: white; border: none; 
            padding: 15px 30px; border-radius: 50px; font-weight: bold; 
            cursor: pointer; width: 100%; font-size: 1.1rem;
            transition: 0.3s;
        }
        button:hover { background: #764ba2; transform: scale(1.02); }
        #result { 
            margin-top: 25px; padding: 15px; background: #f4f7fe; 
            border-radius: 15px; display: none; color: #444; 
            border-left: 6px solid #667eea; text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Naishlink</h1>
        <p>Connecting pupils to better English.</p>
        <textarea id="userInput" placeholder="Type your simple sentence here..."></textarea>
        <button onclick="runAI()">Make it Professional</button>
        <div id="result"></div>
    </div>

    <script>
        async function runAI() {
            const input = document.getElementById('userInput').value;
            const resultBox = document.getElementById('result');
            if(!input) return;

            resultBox.style.display = "block";
            resultBox.innerHTML = "<em>Naishlink AI is thinking...</em>";

            // In a 'Proper' site, this calls a real AI service.
            // For now, this is a placeholder for your AI logic!
            setTimeout(() => {
                resultBox.innerHTML = "<strong>Professional Version:</strong><br>" + input + " (AI processing enabled)";
            }, 1000);
        }
    </script>
</body>
</html>
