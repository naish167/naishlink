<script>
    async function askAI() {
        const input = document.getElementById('userInput').value;
        const output = document.getElementById('output');
        if(!input) return;

        output.style.display = "block";
        output.innerText = "Naishlink is thinking...";

        try {
            const response = await fetch("https://huggingface.co", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ inputs: `Rewrite this professionally: "${input}"` })
            });
            const data = await response.json();
            let result = data.generated_text || data[0].generated_text;
            output.innerHTML = "<strong>Professional Version:</strong><br>" + result.split('"').pop().trim();
        } catch (e) {
            // BACKUP BRAIN (If Real AI is busy)
            let backup = "I am writing to formally notify you that " + input + ".";
            if(input.toLowerCase().includes("can't come")) backup = "I am unfortunately unable to attend as requested.";
            if(input.toLowerCase().includes("thanks")) backup = "I would like to express my sincere appreciation.";
            
            output.innerHTML = "<strong>Professional Version (Backup):</strong><br>" + backup;
        }
    }
</script>
